<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary redirect — fires after 0 seconds -->
  <meta http-equiv="refresh" content="0; url=https://script.google.com/a/macros/uitm.edu.my/s/AKfycby1M1Re_3AwN6XTOE5ylt3sRgb1fiVBvceWU6gcnOvD2OnEK5yKRhC9zJ3MFX1H1JxX/exec" />

  <title>Opening HADIR…</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy-950: #020817;
      --navy-900: #0f172a;
      --indigo-600: #4f46e5;
      --blue-600: #2563eb;
      --blue-500: #3b82f6;
      --blue-400: #60a5fa;
      --cyan-400: #22d3ee;
      --white: #ffffff;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--navy-950);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--white);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 20%, rgba(79, 70, 229, .32), transparent 42%),
        radial-gradient(circle at 80% 70%, rgba(37, 99, 235, .18), transparent 38%),
        radial-gradient(circle at 20% 80%, rgba(34, 211, 238, .12), transparent 34%);
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 620px;
      height: 620px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(96,165,250,.28) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(10px);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 28px;
      padding: 3.2rem 2.6rem;
      text-align: center;
      max-width: 430px;
      width: 90%;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      box-shadow:
        0 28px 80px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.08);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(96,165,250,.12), transparent 36%);
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 76px;
      height: 76px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--indigo-600), var(--blue-600));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.6rem;
      box-shadow: 0 10px 34px rgba(79,70,229,.48);
      animation: pulse-logo 2.6s ease-in-out infinite;
    }

    .logo svg {
      width: 38px;
      height: 38px;
      color: #fff;
    }

    @keyframes pulse-logo {
      0%, 100% {
        box-shadow: 0 10px 34px rgba(79,70,229,.48);
        transform: translateY(0);
      }
      50% {
        box-shadow: 0 14px 48px rgba(96,165,250,.70);
        transform: translateY(-2px);
      }
    }

    .system-name {
      font-size: 2rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: -.04em;
      margin-bottom: .25rem;
    }

    .system-sub {
      font-size: .76rem;
      color: rgba(255,255,255,.50);
      letter-spacing: .10em;
      text-transform: uppercase;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 2.35rem;
    }

    .spinner-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .85rem;
      margin-bottom: 1.25rem;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255,255,255,.16);
      border-top-color: var(--blue-400);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .redirect-text {
      font-size: .9rem;
      font-weight: 650;
      color: rgba(255,255,255,.78);
    }

    .progress-track {
      height: 4px;
      background: rgba(255,255,255,.10);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.25);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--indigo-600), var(--blue-400), var(--cyan-400));
      border-radius: 999px;
      box-shadow: 0 0 20px rgba(96,165,250,.65);
      animation: progress 2.2s cubic-bezier(.4,0,.2,1) forwards;
    }

    @keyframes progress {
      0%   { width: 0%; }
      60%  { width: 78%; }
      100% { width: 100%; }
    }

    .manual-link {
      font-size: .76rem;
      color: rgba(255,255,255,.38);
      line-height: 1.6;
    }

    .manual-link a {
      color: var(--blue-400);
      text-decoration: none;
      font-weight: 700;
      transition: color .2s ease;
    }

    .manual-link a:hover {
      color: #93c5fd;
      text-decoration: underline;
    }

    .dots {
      display: inline-flex;
      gap: 3px;
      margin-left: 3px;
      vertical-align: middle;
    }

    .dots span {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,.55);
      animation: dot-bounce .9s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s; }

    @keyframes dot-bounce {
      0%, 80%, 100% {
        transform: translateY(0);
        opacity: .5;
      }
      40% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 2.6rem 1.65rem;
        border-radius: 24px;
      }

      .system-name {
        font-size: 1.75rem;
      }

      .system-sub {
        font-size: .68rem;
      }

      .redirect-text {
        font-size: .84rem;
      }
    }
  </style>
</head>

<body>

  <div class="glow"></div>

  <main class="card" aria-label="Redirecting to HADIR">
    <div class="logo" aria-hidden="true">
      <!-- HADIR shield/check icon -->
      <svg fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
    </div>

    <div class="system-name">HADIR</div>
    <div class="system-sub">Hybrid Attendance, Daily Input &amp; Reporting</div>

    <div class="spinner-wrap">
      <div class="spinner" aria-hidden="true"></div>
      <div class="redirect-text">
        Opening HADIR workspace<span class="dots"><span></span><span></span><span></span></span>
      </div>
    </div>

    <div class="progress-track" aria-hidden="true">
      <div class="progress-fill"></div>
    </div>

    <div class="manual-link">
      Not redirected automatically?<br />
      <a href="https://script.google.com/a/macros/uitm.edu.my/s/AKfycby1M1Re_3AwN6XTOE5ylt3sRgb1fiVBvceWU6gcnOvD2OnEK5yKRhC9zJ3MFX1H1JxX/exec">
        Click here to open HADIR
      </a>
    </div>
  </main>

  <script>
    const TARGET_URL = "https://script.google.com/a/macros/uitm.edu.my/s/AKfycby1M1Re_3AwN6XTOE5ylt3sRgb1fiVBvceWU6gcnOvD2OnEK5yKRhC9zJ3MFX1H1JxX/exec";

    // JavaScript redirect fallback
    window.location.replace(TARGET_URL);
  </script>

</body>
</html>
